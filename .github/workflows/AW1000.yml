name: Build AW1000

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      runner_os:
        description: "Choose OS to run"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-latest

      version:
        description: "ImmortalWrt Version"
        required: true
        default: "v24.10.4"
        type: choice
        options:
          - 24.10

      log_switch:
        description: "Enable full compile log"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/Lienol/openwrt.git
  REPO_BRANCH: ${{ github.event.inputs.version || 'v24.10.4' }}
  CONFIG_FILE: config/AW1000.config
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  UPLOAD_BIN_DIR: true
  TZ: Asia/Kuala_Lumpur
  EXPECTED_DEVICE: arcadyan_aw1000

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner_os || 'ubuntu-24.04' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get update
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Clone source code
        run: |
          echo "Building ${REPO_BRANCH}"
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt

      - name: Create build directories
        run: |
          sudo mkdir -p -m 777 /mnt/openwrt/{dl,staging_dir,build_dir}
          sudo chown -R $USER:$USER /mnt/openwrt

      - name: Link build directories
        run: |
          rm -rf openwrt/dl
          rm -rf openwrt/staging_dir
          rm -rf openwrt/build_dir

          ln -sf /mnt/openwrt/dl openwrt/dl
          ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sf /mnt/openwrt/build_dir openwrt/build_dir

      - name: Configuration Customization
        run: |
          if [ ! -f "${CONFIG_FILE}" ]; then
            echo "Config file not found: ${CONFIG_FILE}"
            exit 1
          fi

          if [ -f "./customize.sh" ]; then
            chmod +x customize.sh
            ./customize.sh
          fi

          if [ -d "./files" ]; then
            mv files openwrt/files
          fi

          cp -f "${CONFIG_FILE}" openwrt/.config

          cd openwrt
          sed -i 's/[[:space:]]*$//' .config
          make defconfig

      - name: Verify AW1000 Target
        run: |
          cd openwrt

          echo "========== SELECTED DEVICE =========="
          grep '^CONFIG_TARGET_.*DEVICE_.*=y' .config || true
          echo "===================================="

          DEVICE_LINE="$(grep '^CONFIG_TARGET_.*DEVICE_.*=y' .config || true)"

          if [ -z "${DEVICE_LINE}" ]; then
            echo "ERROR: No target device detected in .config"
            exit 1
          fi

          if echo "${DEVICE_LINE}" | grep -q "${EXPECTED_DEVICE}=y"; then
            echo "AW1000 target verified."
          else
            echo ""
            echo "ERROR: Wrong target detected!"
            echo "Expected: CONFIG_TARGET_qualcommax_ipq807x_DEVICE_${EXPECTED_DEVICE}=y"
            echo "Detected:"
            echo "${DEVICE_LINE}"
            exit 1
          fi

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -type f -size -1024c -delete

      - name: Compile OpenWrt
        id: compile
        run: |
          cd openwrt

          if [ "${{ github.event.inputs.log_switch }}" = "true" ]; then
            time make -j$(nproc) || time make -j1 V=s
          else
            time make -j$(nproc)
          fi

          echo "========== GENERATED FILES =========="
          find bin/targets -type f | sort
          echo "====================================="

          echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
          echo "DEVICE_NAME=_AW1000" >> $GITHUB_ENV
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Verify AW1000 Firmware Exists
        run: |
          cd openwrt/bin/targets/qualcommax/ipq807x

          echo "========== AW1000 IMAGE CHECK =========="
          ls -lah *arcadyan_aw1000* || true
          echo "======================================="

          if ! ls *arcadyan_aw1000* >/dev/null 2>&1; then
            echo "ERROR: AW1000 firmware not found!"
            exit 1
          fi

      - name: Organize firmware
        id: organize
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          mkdir -p /tmp/firmware-aw1000

          cd openwrt/bin/targets/qualcommax/ipq807x

          rm -rf packages

          cp -af *arcadyan_aw1000* /tmp/firmware-aw1000/
          cp -af sha256sums /tmp/firmware-aw1000/ 2>/dev/null || true
          cp -af profiles.json /tmp/firmware-aw1000/ 2>/dev/null || true

          echo "========== AW1000 FILES =========="
          ls -lah /tmp/firmware-aw1000
          echo "=================================="

          echo "FIRMWARE=/tmp/firmware-aw1000" >> $GITHUB_ENV
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Create full bin archive
        if: ${{ env.UPLOAD_BIN_DIR == 'true' && steps.compile.outputs.status == 'success' }}
        run: |
          tar -czf OpenWrt_bin.tar.gz -C openwrt bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        if: ${{ steps.organize.outputs.status == 'success' }}
        with:
          name: Firmware_AW1000${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*
          retention-days: 7

      - name: Upload full bin artifact
        uses: actions/upload-artifact@v4
        if: ${{ env.UPLOAD_BIN_DIR == 'true' && steps.compile.outputs.status == 'success' }}
        with:
          name: Full_BIN_AW1000${{ env.FILE_DATE }}
          path: OpenWrt_bin.tar.gz
          retention-days: 7

      - name: Generate release info
        id: release
        if: ${{ env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' }}
        run: |
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

          cat > release.txt << EOF
          🚀 AW1000 Firmware Build

          Device : Arcadyan AW1000
          Source : ${REPO_URL}
          Branch : ${REPO_BRANCH}
          Runner : ${{ github.event.inputs.runner_os || 'ubuntu-24.04' }}
          Build  : $(date '+%Y-%m-%d %H:%M')
          EOF

      - name: Upload firmware to GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' }}
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          body_path: release.txt
          files: |
            ${{ env.FIRMWARE }}/*
            OpenWrt_bin.tar.gz
