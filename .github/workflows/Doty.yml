name: Build OpenWrt SDK Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  SDK_URL: https://downloads.openwrt.org/releases/24.10.6/targets/qualcommax/ipq807x/openwrt-sdk-24.10.6-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    name: Build IPK Packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex g++ gawk gcc gcc-multilib g++-multilib gettext \
            git gperf haveged help2man intltool libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-dev python3-pip python3-ply python3-setuptools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev zstd \
            bc file liblzma-dev meson mold mtd-utils pbzip2 pigz pkg-config \
            time u-boot-tools xsltproc

      - name: Download OpenWrt SDK 24.10.6
        run: |
          wget -q -O sdk.tar.zst "${SDK_URL}"
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Configure Git
        run: |
          git config --global advice.detachedHead false

      - name: Clone Private Packages
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cd openwrt-sdk/package

          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-modeminfo.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-netstat.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-projectx.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-aw1k-led.git

      - name: Update Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd openwrt-sdk

          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=y
          EOF

          make defconfig

      - name: Build luci-app-modeminfo
        run: |
          cd openwrt-sdk
          make package/luci-app-modeminfo/compile -j$(nproc) || make package/luci-app-modeminfo/compile V=s -j1

      - name: Build luci-app-netstat
        run: |
          cd openwrt-sdk
          make package/luci-app-netstat/compile -j$(nproc) || make package/luci-app-netstat/compile V=s -j1

      - name: Build luci-app-projectx
        run: |
          cd openwrt-sdk
          make package/luci-app-projectx/compile -j$(nproc) || make package/luci-app-projectx/compile V=s -j1

      - name: Build luci-app-aw1k-led
        run: |
          cd openwrt-sdk
          make package/luci-app-aw1k-led/compile -j$(nproc) || make package/luci-app-aw1k-led/compile V=s -j1

      - name: Collect IPK Files
        run: |
          mkdir -p output

          find openwrt-sdk/bin/packages \
            -type f \
            -name "*.ipk" \
            -exec cp -f {} output/ \;

          if [ -z "$(ls -A output/*.ipk 2>/dev/null)" ]; then
            echo "No IPK files found!"
            exit 1
          fi

          ls -lah output

      - name: Generate SHA256
        run: |
          cd output
          sha256sum *.ipk > sha256sums.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-24.10.6-IPK
          path: output/*

      - name: Generate Release Tag
        run: |
          echo "TAG_NAME=openwrt-sdk-24.10.6-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Create Release And Upload IPK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: OpenWrt SDK 24.10.6 Packages
          generate_release_notes: true
          files: |
            output/*.ipk
            output/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
