name: Build OpenWrt SDK Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  SDK_URL: https://downloads.openwrt.org/releases/24.10.6/targets/qualcommax/ipq807x/openwrt-sdk-24.10.6-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    name: Build IPK Packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl tar zstd patch libelf-dev \
            bc time perl

      - name: Download OpenWrt SDK 24.10.6
        run: |
          wget -q -O sdk.tar.zst "${SDK_URL}"
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Clone Private Packages
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PRIVATE_REPO_TOKEN is empty!"
            exit 1
          fi

          cd openwrt-sdk/package

          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-modeminfo.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-netstat.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-projectx.git
          git clone --depth=1 https://x-access-token:${TOKEN}@github.com/DotyCat/luci-app-aw1k-led.git

      - name: Install Required Feeds Only
        run: |
          cd openwrt-sdk

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd openwrt-sdk

          cat > .config <<EOF
          CONFIG_PACKAGE_luci-app-modeminfo=m
          CONFIG_PACKAGE_luci-app-netstat=m
          CONFIG_PACKAGE_luci-app-projectx=m
          CONFIG_PACKAGE_luci-app-aw1k-led=m
          EOF

          make defconfig

      - name: Build Packages
        run: |
          cd openwrt-sdk

          make package/luci-app-modeminfo/compile -j$(nproc) || make package/luci-app-modeminfo/compile V=s -j1
          make package/luci-app-netstat/compile -j$(nproc) || make package/luci-app-netstat/compile V=s -j1
          make package/luci-app-projectx/compile -j$(nproc) || make package/luci-app-projectx/compile V=s -j1
          make package/luci-app-aw1k-led/compile -j$(nproc) || make package/luci-app-aw1k-led/compile V=s -j1

      - name: Collect Custom IPK Files Only
        run: |
          mkdir -p output

          find openwrt-sdk/bin/packages -type f \( \
            -name "luci-app-modeminfo*.ipk" -o \
            -name "luci-app-netstat*.ipk" -o \
            -name "luci-app-projectx*.ipk" -o \
            -name "luci-app-aw1k-led*.ipk" \
          \) -exec cp -f {} output/ \;

          if [ -z "$(ls -A output/*.ipk 2>/dev/null)" ]; then
            echo "No custom IPK files found!"
            exit 1
          fi

          ls -lah output

      - name: Generate SHA256
        run: |
          cd output
          sha256sum *.ipk > sha256sums.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-24.10.6-Custom-IPK
          path: output/*

      - name: Generate Release Tag
        run: |
          echo "TAG_NAME=openwrt-sdk-24.10.6-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Create Release And Upload IPK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: OpenWrt SDK 24.10.6 Custom Packages
          generate_release_notes: true
          files: |
            output/*.ipk
            output/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
